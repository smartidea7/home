<!-- ================= HERO ================= -->




<section class="about-section">

<div class="section-title">

<div class="section-line"></div>

<div class="section-info">

<h2>اطلاعات تماس</h2>

<span>Contact Information</span>

</div>

<svg class="icon">
<use href="images/icons.svg#icon-phone"></use>
</svg>

</div>

<div class="about-card">

<div class="about-card-header">

<div>

<h3>تماس با Smart Idea</h3>

<p class="about-caption">

تلفن:
0912 XXX XXXX

<br>

ایمیل:
info@smartidea.ir

</p>

</div>

</div>

</div>

</section>

<section class="about-section">

<div class="section-title">

<div class="section-line"></div>

<div class="section-info">

<h2>ارسال پیام</h2>

<span>Send Message</span>

</div>

<svg class="icon">
<use href="images/icons.svg#icon-user"></use>
</svg>

</div>

<form id="contactForm" class="contact-form">

<input
type="tel"
id="mobile"
placeholder="شماره موبایل"
required>

<textarea
id="message"
rows="5"
placeholder="پیام شما..."
required></textarea>

<button id="sendBtn" type="submit">

ارسال پیام

</button>

<p id="status"></p>

</form>

</section>




<!-- ================= BOTTOM MENU ================= -->

<nav class="bottom-nav">

<a href="index.html">

</svg>

<p>

</p>

</div>

<script>

const form=document.getElementById("contactForm");

form.addEventListener("submit",async function(e){

e.preventDefault();

const btn=document.getElementById("sendBtn");
const status=document.getElementById("status");

btn.disabled=true;
btn.innerHTML="در حال ارسال...";

const mobile=document.getElementById("mobile").value.trim();
const message=document.getElementById("message").value.trim();

if(!/^09\d{9}$/.test(mobile)){

status.style.color="#d32f2f";
status.innerHTML="شماره موبایل صحیح نیست.";

btn.disabled=false;
btn.innerHTML="ارسال پیام";

return;

}

try{

await fetch("https://script.google.com/macros/s/AKfycbxbCFFoh_0Cgf3jMqPDFujPXTo2lswPJOEQQzGWR1X_J44gJInxZeAFXmlvr53Gq7EaYQ/exec",{

method:"POST",

body:JSON.stringify({

mobile:mobile,

message:message

})

});

status.style.color="#2e7d32";
status.innerHTML="پیام شما با موفقیت ثبت شد.";

form.reset();

}

catch(err){

status.style.color="#d32f2f";
status.innerHTML="خطا در ارسال. دوباره تلاش کنید.";

}

btn.disabled=false;
btn.innerHTML="ارسال پیام";

});

</script>
