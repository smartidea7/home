:root {

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Vazirmatn', sans-serif; background: var(--bg); color: var(--text);

.container { padding: 16px; }
header { margin-bottom:10px; text-align:center; }

.gallery-item{

    border-radius:16px;
    overflow:hidden;

}

.gallery-item:active{

}    
    
.image-box{

box-shadow:
0 10px 28px rgba(0,0,0,.10);

}
    .hero-image-box{

width:100%;
aspect-ratio:2.2/1;
position:relative;
overflow:hidden;
border-radius:12px;

box-shadow:
0 10px 28px rgba(0,0,0,.10);

	}



.hero-image-box img {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
	}



.gallery-item:active img{

transform:scale(1.02);

.fade { opacity:0; transform:translateY(14px); transition: opacity 0.8s ease-out, 

transform 0.8s ease-out; }
.fade.show { opacity:1; transform:translateY(0); }
.card-link{

 stroke-width:1;

<script>
document.addEventListener('DOMContentLoaded', function(){
  const faders = document.querySelectorAll('.fade');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        entry.target.classList.add('show');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });
  faders.forEach(el => observer.observe(el));

  
});
</script>
