<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ایده هوشمند | Smart Idea</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa;
  --text: #111;
  --muted: #777;
  --accent: #e46f1f;
  --border: #ddd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Vazirmatn', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding-bottom: 70px; } 
  body {
  max-width: 480px;
  margin: 0 auto;
}
.container { padding: 16px; }
header { margin-bottom:24px; text-align:center; }
.logo { width: 120px; max-width: 100%; margin-bottom:12px; }
header h1 { font-size:1rem; font-weight:400; letter-spacing:-0.3px; }
header h1 span{
    color:#8a8a8a;
    font-size:.75rem;
    font-weight:400;
    letter-spacing:.5px;
}
header p { max-width: 320px; margin: 8px auto 0; font-size:0.65rem; color: var(--muted); }
.gallery{
    display:flex;
    flex-direction:column;
    gap:26px;
}
.gallery-item{

    border-radius:16px;
    overflow:hidden;
    transition:.35s;
}

.gallery-item:active{

    transform:scale(.985);

}    
    
.gallery-item h2 { font-size:0.95rem; font-weight:500; }
.gallery-item h3 { font-size:0.75rem; color: var(--muted); margin:2px 0 8px; }
.image-box{

box-shadow:
0 10px 28px rgba(0,0,0,.10);

}
    
  .hero-image-box{
    position:relative;
    overflow:hidden;
}

.hero-image-box::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to top,
        rgba(0,0,0,.30),
        rgba(0,0,0,.08)
    );
}

.hero-image-box img {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
	}

.image-box img{

transition:.45s;

}

.gallery-item:hover img{

transform:scale(1.04);

}

.gallery-item:active img{

transform:scale(1.02);

	}
	
.gallery-item a { display:inline-block; margin-top:8px; font-size:0.8rem; color: var(--accent); text-decoration:none; font-weight:500; }
.fade { opacity:0; transform:translateY(14px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
.fade.show { opacity:1; transform:translateY(0); }
.card-link{

display:block;

text-decoration:none;

color:inherit;

}

.image-box::after{

content:"";

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

background:

linear-gradient(
180deg,
rgba(0,0,0,.10),
rgba(0,0,0,.30)
);

}

.image-title{

position:absolute;

right:24px;

bottom:22px;

color:#fff;

z-index:5;

}

.image-title h2{

font-size:1.4rem;

margin:0;

}

.image-title p{

font-size:.9rem;

opacity:.9;

margin-top:4px;

}

/* ===== Bottom Navigation ===== */

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:60px;
    background:#fff;
    border-top:1px solid var(--border);
    display:flex;
    justify-content:space-around;
    align-items:center;
    z-index:1000;
}

.bottom-nav a{
    text-decoration:none;
    color:#333;
    font-size:.7rem;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    font-family:'Vazirmatn',sans-serif;
    font-weight:500;
}

.bottom-nav a:visited{
    color:#333;
}

.bottom-nav a:hover,
.bottom-nav a:active{
    color:var(--accent);
}

.icon{
    width:20px;
    height:20px;
    stroke:var(--accent);
    fill:none;
    stroke-width:1.6;
	}


	
.gallery-item a::after { content:''; display:block; width:20px; height:1px; background: var(--accent); margin-top:2px; }
.footer { margin-top:24px; padding:24px 8px 8px; text-align:center; color:#888; font-size:0.7rem; }
.footer .brand { font-size:0.8rem; font-weight:500; color:#666; margin-bottom:4px; }
.footer .desc { font-size:0.7rem; line-height:1.6; color:#999; max-width:280px; margin:0 auto 6px; }
.footer .copy { font-size:0.65rem; color:#aaa; }
</style>
</head>
<body>
<div class="container">

  <header>
  <img src="images/logo.png" alt="Smart Idea Logo" class="logo">

<h1>
گروه بازرگانی، طراحی و مهندسی ایده هوشمند
<span>Smart Idea | Trading, Design & Engineering Group</span>
</h1>
  <p>
      تأمین کالاهای تخصصی و اجرای پروژه‌های طراحی و مهندسی
  </p>
</header>

  
<section class="gallery">

<a class="card-link" href="products.html">

<div class="gallery-item fade" id="products">

    <div class="hero-image-box">
        <img src="images/products.jpg" alt="محصولات">
    </div>

</div>

</a>	

<a class="card-link" href="projects.html">

<div class="gallery-item fade" id="projects">

    <div class="hero-image-box">
        <img src="images/projects.jpg" alt="پروژه ها">
    </div>

</div>

</a>


</section>


<object type="image/svg+xml" data="icons.svg" style="display:none;"></object>

<nav class="bottom-nav">

  <a href="index.html">
    <svg class="icon">
      <use href="images/icons.svg#icon-home"></use>
    </svg>
    خانه
  </a>

  <a href="#products">
    <svg class="icon">
      <use href="images/icons.svg#icon-products"></use>
    </svg>
    محصولات
  </a>

  <a href="#projects">
    <svg class="icon">
      <use href="images/icons.svg#icon-projects"></use>
    </svg>
    پروژه‌ها
  </a>

  <a href="#contact">
    <svg class="icon">
      <use href="images/icons.svg#icon-phone"></use>
    </svg>
    تماس
  </a>

  <a href="#about">
    <svg class="icon">
      <use href="images/icons.svg#icon-user"></use>
    </svg>
    درباره ما
  </a>

</nav>
  

<footer class="footer">
  
  <p class="copy">© 2026 Smart Idea. All rights reserved.</p>
</footer>

</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const faders = document.querySelectorAll('.fade');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        entry.target.classList.add('show');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });
  faders.forEach(el => observer.observe(el));

  
});
</script>

</body>
</html>
