<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ایده هوشمند | Smart Idea</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafafa;
  --text: #111;
  --muted: #777;
  --accent: #e46f1f;
  --border: #ddd;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Vazirmatn', sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; padding-bottom: 0px; } 
  body {
  max-width: 480px;
  margin: 0 auto;
}
.container { padding: 16px; }
header { margin-bottom:25px; text-align:center; }
.logo { width: 80px; max-width: 100%; margin-bottom:12px; }
header h1 { font-size:1rem; font-weight:400; letter-spacing:-0.3px; }
header h1 span { display:block; margin-top:4px; font-family:'Playfair Display', serif; font-size:0.8rem; color:#999; font-weight:400; letter-spacing:1px; }
header p { max-width: 320px; margin: 8px auto 0; font-size:0.85rem; color: var(--muted); }
/* ===== Compact Header ===== */

.compact-header{

display:flex;
align-items:center;
gap:10px;

padding:4px 0 6px;

margin-bottom:6px;

}

.compact-header .logo{

width:46px;

margin:0;

flex-shrink:0;

}




.gallery { display:flex; flex-direction:column; gap:24px; }
/* ===== Category Navigation ===== */

.category-wrapper{

position:sticky;

top:0;

z-index:900;

background:#fafafa;

padding:0;

margin:0 0 6px 0;

}

.category-nav{

display:flex;

justify-content:space-between;

align-items:flex-start;

padding:2px 0;

margin:0;

border-bottom:1px solid #eee;

}

.cat-item{

display:flex;

flex-direction:column;

align-items:center;

gap:2px;

text-decoration:none;

color:#222;

font-size:.56rem;

font-weight:500;

line-height:1.1;

}

.cat-icon{

width:38px;

height:38px;

border:1.3px solid #222;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

background:#fff;

transition:.25s;

}

.cat-svg{

width:18px;

height:18px;

stroke:var(--accent);

fill:none;

stroke-width:1.7;

}

.cat-item.active{

color:var(--accent);

}

.cat-item.active .cat-icon{

border-color:var(--accent);

}
.gallery-item h2 { font-size:0.95rem; font-weight:500; }
.gallery-item h3 { font-size:0.75rem; color: var(--muted); margin:2px 0 8px; }
.image-box { width:100%; padding-top:100%; position:relative; overflow:hidden; border-radius:6px; }
  .hero-image-box {
  width:100%;
  aspect-ratio:2 / 1;
  position:relative;
  overflow:hidden;
  border-radius:8px;
}

.hero-image-box img {
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.image-box img { position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; }
.gallery-item a { display:inline-block; margin-top:8px; font-size:0.8rem; color: var(--accent); text-decoration:none; font-weight:500; }
.fade { opacity:0; transform:translateY(14px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
.fade.show { opacity:1; transform:translateY(0); }

.bottom-nav { position:fixed; bottom:0; left:0; right:0; height:56px; background:#fff; border-top:1px solid var(--border); display:flex; justify-content:space-around; align-items:center; z-index:1000; }
.bottom-nav a { text-decoration:none; color:#222; font-size:0.65rem; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bottom-nav a:active { color: var(--accent); }
.icon { width:18px; height:18px; stroke: var(--accent); fill:none; stroke-width:1.6; }
.gallery-item a::after { content:''; display:block; width:20px; height:1px; background: var(--accent); margin-top:2px; }
.footer { margin-top:24px; padding:24px 8px 8px; text-align:center; color:#888; font-size:0.7rem; }
.footer .brand { font-size:0.8rem; font-weight:500; color:#666; margin-bottom:4px; }
.footer .desc { font-size:0.7rem; line-height:1.6; color:#999; max-width:280px; margin:0 auto 6px; }
.footer .copy { font-size:0.65rem; color:#aaa; }
/* ===== Compact Header ===== */

.compact-header{

display:flex;
align-items:center;
gap:10px;

padding:2px 0;

margin:0 0 4px 0;

}

.compact-header .logo{

width:58px;

height:auto;

margin:0;

flex-shrink:0;

}

.header-text{

display:flex;

flex-direction:column;

justify-content:center;

gap:0;

line-height:1;

}

.header-text h1{

font-size:1rem;

font-weight:600;

margin:0;

line-height:1.2;
padding:0;

}

.header-text span{

font-size:.60rem;

color:#888;

margin:0;

padding:0;

line-height:1;

letter-spacing:.4px;

}

/*========== Product Sections ==========*/

.product-section{
    margin-top:22px;
    scroll-margin-top:120px;
}

.section-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
}

.section-title svg{
    width:22px;
    height:22px;
    stroke:var(--accent);
    flex:none;
}

.section-title h2{
    font-size:1rem;
    font-weight:600;
}

.section-title span{
    display:block;
    font-size:.68rem;
    color:#888;
    direction:ltr;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
}

.product-card{
    position:relative;
    aspect-ratio:1/1;
    overflow:hidden;
    border-radius:10px;
    background:#eee;
}

.product-card img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:.35s;
}

.product-card:active img{
    transform:scale(1.03);
}

/* Caption */

.product-caption{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    padding:5px 6px;
    font-size:.60rem;
    color:#fff;

    background:linear-gradient(
        to top,
        rgba(0,0,0,.55),
        rgba(0,0,0,0)
    );
}

/* Watermark */

.product-card::after{

    content:"Smart Idea";

    position:absolute;

    inset:0;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:.82rem;

    font-weight:600;

    color:#fff;

    opacity:.09;

    transform:rotate(-28deg);

    pointer-events:none;

    letter-spacing:2px;

}



</style>
</head>
<body>
<div class="container">

<header class="compact-header">

    <img src="images/logo.png" alt="Smart Idea Logo" class="logo">

    <div class="header-text">
        <h1>محصولات تخصصی</h1>
        <span>Specialized Products</span>
    </div>

</header>

<nav class="category-nav">

   <a href="#consumables"
   class="cat-item active"
   data-target="consumables">
        <div class="cat-icon">
            <svg class="cat-svg">
                <use href="images/icons.svg#icon-consumables"></use>
            </svg>
        </div>
        <span>تجهیزات پزشکی مصرفی</span>
    </a>

    <a href="#hospital" class="cat-item" data-target="hospital">
        <div class="cat-icon">
            <svg class="cat-svg">
                <use href="images/icons.svg#icon-hospital"></use>
            </svg>
        </div>
        <span>هتلینگ بیمارستانی</span>
    </a>

    <a href="#gas" class="cat-item" data-target="gas">
        <div class="cat-icon">
            <svg class="cat-svg">
                <use href="images/icons.svg#icon-gas"></use>
            </svg>
        </div>
        <span>گازهای طبی</span>
    </a>

    <a href="#lead" class="cat-item" data-target="lead">
        <div class="cat-icon">
            <svg class="cat-svg">
                <use href="images/icons.svg#icon-lead"></use>
            </svg>
        </div>
        <span>سرب</span>
    </a>

    <a href="#special" class="cat-item" data-target="special">
        <div class="cat-icon">
            <svg class="cat-svg">
                <use href="images/icons.svg#icon-special"></use>
            </svg>
        </div>
        <span>سایر</span>
    </a>

</nav>
  
  
<section
class="gallery"
id="productsContainer">
</section>

 <script>

const container =
document.getElementById("productsContainer");

productCategories.forEach(cat=>{

let html=`

<section
class="product-section fade"
id="${cat.id}">

<div class="section-title">

<svg class="icon">

<use href="images/icons.svg#${cat.icon}"></use>

</svg>

<div>

<h2>${cat.title}</h2>

<span>${cat.en}</span>

</div>

</div>

<div class="product-grid">

`;

for(let i=1;i<=cat.count;i++){

const file=String(i).padStart(3,"0");

html+=`

<a
class="product-card gallery-link"

href="images/originals/${cat.folder}/${file}.jpg"

data-category="${cat.folder}"

data-caption="">

<img

loading="lazy"

decoding="async"

src="images/originals/${cat.folder}/${file}.jpg"

alt="${cat.title}">

<div class="product-caption"></div>

</a>

`;

}

html+=`

</div>

</section>

`;

container.insertAdjacentHTML("beforeend",html);

});

</script>



  


<object type="image/svg+xml" data="icons.svg" style="display:none;"></object>

<nav class="bottom-nav">

  <a href="index.html">
    <svg class="icon">
      <use href="images/icons.svg#icon-home"></use>

    </svg>
    خانه
  </a>

  <a href="#products">
    <svg class="icon">
      <use href="images/icons.svg#icon-products"></use>
    </svg>
    محصولات
  </a>

  <a href="#projects">
    <svg class="icon">
      <use href="images/icons.svg#icon-projects"></use>
    </svg>
    پروژه‌ها
  </a>

  <a href="#contact">
    <svg class="icon">
      <use href="images/icons.svg#icon-phone"></use>
    </svg>
    تماس
  </a>

  <a href="#about">
    <svg class="icon">
      <use href="images/icons.svg#icon-user"></use>
    </svg>
    درباره ما
  </a>

</nav>
  

<footer class="footer">
  
  <p class="copy">© 2026 Smart Idea. All rights reserved.</p>
</footer>

</div>

<script>

const productCategories = [

{
id:"consumables",
title:"تجهیزات پزشکی مصرفی",
en:"Medical Consumables",
icon:"icon-consumables",
folder:"consumables",
count:2
},

{
id:"hospital",
title:"ترالی و تجهیزات هتلینگ بیمارستانی",
en:"Hospital Equipment",
icon:"icon-hospital",
folder:"hospital",
count:2
},

{
id:"gas",
title:"کنسول و تجهیزات گازهای طبی",
en:"Medical Gas Systems",
icon:"icon-gas",
folder:"gas",
count:2
},

{
id:"lead",
title:"سرب و تجهیزات حفاظتی",
en:"Lead Shielding Materials",
icon:"icon-lead",
folder:"lead",
count:2
},

{
id:"special",
title:"سایر کالاهای تخصصی",
en:"Specialized Products",
icon:"icon-special",
folder:"special",
count:2
}

];

</script>

  

  
<script>
document.addEventListener('DOMContentLoaded', function(){
  const faders = document.querySelectorAll('.fade');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) {
        entry.target.classList.add('show');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.2 });
  faders.forEach(el => observer.observe(el));

  
});
</script>

</body>
</html>
