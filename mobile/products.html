<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
ایده هوشمند | Smart Idea
</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap" rel="stylesheet">


<style>

:root{

--bg:#fafafa;
--text:#111;
--muted:#777;
--accent:#e46f1f;
--border:#ddd;

}


*{

box-sizing:border-box;
margin:0;
padding:0;

}



html{

scroll-behavior:smooth;

}



body{

font-family:'Vazirmatn',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.7;
max-width:480px;
margin:auto;
padding-bottom:70px;

}



.container{

padding:16px;

}



/* HEADER */


.compact-header{

display:flex;
align-items:center;
gap:12px;
margin-bottom:8px;

}



.logo{

width:58px;
height:auto;

}



.header-text h1{

font-size:1rem;
font-weight:600;

}


.header-text span{

font-size:.6rem;
color:#888;

}




/* CATEGORY MENU */


.category-wrapper{

position:sticky;
top:0;
z-index:999;
background:#fafafa;
padding:8px 0 12px;

}



.category-nav{

display:flex;
width:100%;
border-bottom:1px solid #eee;

}



.cat-item{

flex:1;

display:flex;
flex-direction:column;
align-items:center;

gap:3px;

text-decoration:none;

color:#222;

font-size:.55rem;

line-height:1.2;

}



.cat-icon{

width:38px;
height:38px;

border-radius:50%;

border:1px solid #222;

display:flex;

align-items:center;
justify-content:center;

background:#fff;

}



.cat-svg{

width:18px;
height:18px;

stroke:var(--accent);
fill:none;

}



.cat-item.active{

color:var(--accent);

}


.cat-item.active .cat-icon{

background:var(--accent);
border-color:var(--accent);

}


.cat-item.active .cat-svg{

stroke:#fff;

}




/* PRODUCT SECTION */


.product-section{

margin-top:24px;

scroll-margin-top:110px;

}



.section-title{

display:flex;

align-items:center;

margin-bottom:14px;

padding-bottom:8px;

border-bottom:1px solid #eee;

}



.section-line{

width:4px;

height:34px;

background:var(--accent);

border-radius:3px;

margin-left:10px;

}



.section-info{

flex:1;

}



.section-info h2{

font-size:1rem;

font-weight:600;

}


.section-info span{

font-size:.7rem;

color:#999;

}




/* GRID */


.product-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:8px;

}



.product-card{

position:relative;

aspect-ratio:1;

background:white;

border-radius:10px;

overflow:hidden;

border:1px solid #eee;

cursor:pointer;

}



.product-card img{

width:100%;

height:100%;

object-fit:contain;

padding:5px;

}




/* WATERMARK */


.product-card::after{

content:"";

position:absolute;

inset:0;

background:url(images/watermark/watermark.png)

center/60% no-repeat;

opacity:.12;

pointer-events:none;

}



/* ANIMATION */


.fade{

opacity:0;

transform:translateY(15px);

transition:.6s;

}


.fade.show{

opacity:1;

transform:none;

}



/* LIGHTBOX */


.lightbox{

position:fixed;

inset:0;

background:rgba(0,0,0,.82);

display:none;

justify-content:center;

align-items:center;

z-index:2000;

padding:20px;

}



.lightbox.active{

display:flex;

}



.lightbox img{

max-width:95%;

max-height:80%;

object-fit:contain;

border-radius:8px;

}



/* buttons */


.lightbox-close,
.lightbox-prev,
.lightbox-next{

position:absolute;

border:none;

background:white;

width:40px;

height:40px;

border-radius:50%;

font-size:24px;

cursor:pointer;

}



.lightbox-close{

top:20px;

right:20px;

}



.lightbox-prev{

left:20px;

top:50%;

}



.lightbox-next{

right:20px;

top:50%;

}



.lightbox-counter{

position:absolute;

top:25px;

left:50%;

transform:translateX(-50%);

color:white;

font-size:.8rem;

}



.lightbox-caption{

position:absolute;

bottom:30px;

color:white;

font-size:.85rem;

text-align:center;

}



/* BOTTOM NAV */


.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:56px;

background:white;

border-top:1px solid #ddd;

display:flex;

justify-content:space-around;

align-items:center;

z-index:1000;

}



.bottom-nav a{

text-decoration:none;

color:#222;

font-size:.65rem;

display:flex;

flex-direction:column;

align-items:center;

}



.icon{

width:18px;

height:18px;

stroke:var(--accent);

fill:none;

}


.footer{

text-align:center;

font-size:.65rem;

color:#999;

padding:20px;

}



</style>


</head>


<body>

<div class="container">

<!-- ================= Lightbox ================= -->

<div id="lightbox" class="lightbox">

<button class="lightbox-close">

&times;

<button class="lightbox-prev">

&#10094;

</button>



<img
id="lightboxImage"
src=""
alt="">



<button class="lightbox-next">

&#10095;

</button>



<div
class="lightbox-counter"
id="lightboxCounter">

</div>



<div
class="lightbox-caption"
id="lightboxCaption">

</div>

</div>



<!-- ================= Bottom Menu ================= -->

<nav class="bottom-nav">

<a href="index.html">

<svg class="icon">

<use href="images/icons.svg#icon-home"></use>

</svg>

<object
type="image/svg+xml"
data="images/icons.svg"
style="display:none;">
</object>
  
<script>

/*==================================================
    Fade Animation
==================================================*/

const observer = new IntersectionObserver((entries)=>{

    entries.forEach(entry=>{

        if(entry.isIntersecting){

            entry.target.classList.add("show");

        }

    });

},{
    threshold:.15
});


/*==================================================
    Categories
==================================================*/

const productCategories=[

{
id:"consumables",
title:"تجهیزات پزشکی مصرفی",
en:"Medical Consumables",
icon:"icon-consumables",
folder:"consumables",
count:3
},

{
id:"hospital",
title:"ترالی و تجهیزات هتلینگ بیمارستانی",
en:"Hospital Equipment",
icon:"icon-hospital",
folder:"hospital",
count:2
},

{
id:"gas",
title:"کنسول و تجهیزات گازهای طبی",
en:"Medical Gas Systems",
icon:"icon-gas",
folder:"gas",
count:2
},

{
id:"lead",
title:"سرب و تجهیزات حفاظتی",
en:"Lead Shielding Materials",
icon:"icon-lead",
folder:"lead",
count:2
},

{
id:"special",
title:"سایر کالاهای تخصصی",
en:"Specialized Products",
icon:"icon-special",
folder:"special",
count:0
}

];


/*==================================================
    Build Products
==================================================*/

const container=document.getElementById("productsContainer");

productCategories.forEach(cat=>{

let html=`

<section class="product-section fade" id="${cat.id}">

<div class="section-title">

<div class="section-line"></div>

<div class="section-info">

<h2>${cat.title}</h2>

<span>${cat.en}</span>

</div>

<svg class="icon">

<use href="images/icons.svg#${cat.icon}"></use>

</svg>

</div>

<div class="product-grid">

`;

for(let i=1;i<=cat.count;i++){

const file=String(i).padStart(3,"0");

html+=`

<a class="product-card gallery-link"

href="images/originals/${cat.folder}/${file}.jpg"

data-caption=""

data-index="${i-1}"

data-folder="${cat.folder}">

<img

loading="lazy"

decoding="async"

src="images/originals/${cat.folder}/${file}.jpg"

alt="${cat.title}">

</a>

`;

}

html+=`

</div>

</section>

`;

container.insertAdjacentHTML("beforeend",html);

});


/*==================================================
    Fade Observer
==================================================*/

document
.querySelectorAll(".fade")
.forEach(item=>observer.observe(item));


/*==================================================
    Scroll Spy
==================================================*/

const sections=document.querySelectorAll(".product-section");

const navItems=document.querySelectorAll(".cat-item");

const sectionObserver=new IntersectionObserver((entries)=>{

entries.forEach(entry=>{

if(!entry.isIntersecting)return;

navItems.forEach(item=>item.classList.remove("active"));

document
.querySelector(`.cat-item[data-target="${entry.target.id}"]`)
?.classList.add("active");

});

},{
rootMargin:"-90px 0px -50% 0px",
threshold:.25
});

sections.forEach(section=>{

sectionObserver.observe(section);

});


/*==================================================
    Equal Width Navigation
==================================================*/

navItems.forEach(item=>{

item.style.flex="1";

});

</script>

<script>

/*==============================
    LIGHTBOX
==============================*/

const lightbox = document.getElementById("lightbox");
const lightboxImage = document.getElementById("lightboxImage");
const lightboxCaption = document.getElementById("lightboxCaption");
const lightboxCounter = document.getElementById("lightboxCounter");

const btnPrev = document.querySelector(".lightbox-prev");
const btnNext = document.querySelector(".lightbox-next");
const btnClose = document.querySelector(".lightbox-close");

let galleryItems = [];
let currentIndex = 0;


/* ---------- Refresh Gallery ---------- */

function refreshGallery(){

    galleryItems = [...document.querySelectorAll(".gallery-link")];

}

refreshGallery();


/* ---------- Show Image ---------- */

function showImage(index){

    if(index<0)
        index=galleryItems.length-1;

    if(index>=galleryItems.length)
        index=0;

    currentIndex=index;

    const item=galleryItems[currentIndex];

    lightboxImage.src=item.href;

    lightboxCaption.textContent =
        item.dataset.caption || item.querySelector("img").alt;

    lightboxCounter.textContent =
        (currentIndex+1)+" / "+galleryItems.length;

}


/* ---------- Open ---------- */

galleryItems.forEach((item,index)=>{

    item.addEventListener("click",function(e){

        e.preventDefault();

        showImage(index);

        lightbox.classList.add("active");

        document.body.style.overflow="hidden";

    });

});


/* ---------- Close ---------- */

function closeLightbox(){

    lightbox.classList.remove("active");

    document.body.style.overflow="";

}

btnClose.addEventListener("click",closeLightbox);


/* ---------- Background ---------- */

lightbox.addEventListener("click",function(e){

    if(e.target===lightbox){

        closeLightbox();

    }

});


/* ---------- Next ---------- */

btnNext.addEventListener("click",()=>{

    showImage(currentIndex+1);

});


/* ---------- Prev ---------- */

btnPrev.addEventListener("click",()=>{

    showImage(currentIndex-1);

});


/* ---------- Keyboard ---------- */

document.addEventListener("keydown",function(e){

    if(!lightbox.classList.contains("active"))
        return;

    if(e.key==="Escape")
        closeLightbox();

    if(e.key==="ArrowRight")
        showImage(currentIndex-1);

    if(e.key==="ArrowLeft")
        showImage(currentIndex+1);

});


/* ---------- Swipe ---------- */

let touchStartX=0;

lightbox.addEventListener("touchstart",(e)=>{

    touchStartX=e.changedTouches[0].clientX;

});

lightbox.addEventListener("touchend",(e)=>{

    let touchEndX=e.changedTouches[0].clientX;

    let diff=touchStartX-touchEndX;

    if(Math.abs(diff)<50) return;

    if(diff>0){

        showImage(currentIndex+1);

    }else{

        showImage(currentIndex-1);

    }

});

</script>



  
</body>
