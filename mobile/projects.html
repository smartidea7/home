<style>

:root{

--bg:#fafafa;
--text:#111;
--muted:#777;
--accent:#e46f1f;
--border:#ddd;

}


*{

box-sizing:border-box;
margin:0;
padding:0;

}



html{

scroll-behavior:smooth;

}



body{

font-family:'Vazirmatn',sans-serif;
background:var(--bg);
color:var(--text);
line-height:1.7;
max-width:480px;
margin:auto;
padding-bottom:70px;

}



.container{

padding:16px;

}



/* HEADER */


.compact-header{

display:flex;
align-items:center;
gap:12px;
margin-bottom:8px;

}



.logo{

width:58px;
height:auto;

}



.header-text h1{

font-size:1rem;
font-weight:600;

}


.header-text span{

font-size:.6rem;
color:#888;

}




/* CATEGORY MENU */


.category-wrapper{

position:sticky;
top:0;
z-index:999;
background:#fafafa;
padding:8px 0 12px;

}



.category-nav{

display:flex;
width:100%;
border-bottom:1px solid #eee;

}



.cat-item{

flex:1;

display:flex;
flex-direction:column;
align-items:center;

gap:3px;

text-decoration:none;

color:#222;

font-size:.55rem;

line-height:1.2;

}



.cat-icon{

width:38px;
height:38px;

border-radius:50%;

border:1px solid #222;

display:flex;

align-items:center;
justify-content:center;

background:#fff;

}



.cat-svg{

width:18px;
height:18px;

stroke:var(--accent);
fill:none;

}



.cat-item.active{

color:var(--accent);

}


.cat-item.active .cat-icon{

background:var(--accent);
border-color:var(--accent);

}


.cat-item.active .cat-svg{

stroke:#fff;

}




/* PRODUCT SECTION */


.product-section{

margin-top:24px;

scroll-margin-top:110px;

}



.section-title{

display:flex;

align-items:center;

margin-bottom:14px;

padding-bottom:8px;

border-bottom:1px solid #eee;

}



.section-line{

width:4px;

height:34px;

background:var(--accent);

border-radius:3px;

margin-left:10px;

}



.section-info{

flex:1;

}



.section-info h2{

font-size:1rem;

font-weight:600;

}


.section-info span{

font-size:.7rem;

color:#999;

}




/* GRID */


.product-grid{

display:grid;

grid-template-columns:repeat(3,1fr);

gap:8px;

}



.product-card{

position:relative;

aspect-ratio:1;

background:white;

border-radius:10px;

overflow:hidden;

border:1px solid #eee;

cursor:pointer;

}



.product-card img{

width:100%;

height:100%;

object-fit:contain;

padding:5px;

}








/* ANIMATION */


.fade{

opacity:0;

transform:translateY(15px);

transition:.6s;

}


.fade.show{

opacity:1;

transform:none;

}



/* ===========================
   LIGHTBOX v2
=========================== */

.lightbox{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;

background:rgba(0,0,0,.88);

opacity:0;
visibility:hidden;

transition:.25s;

z-index:3000;

overflow:hidden;

}

.lightbox.active{

opacity:1;
visibility:visible;

}

/* ---------- Stage ---------- */

.lightbox-stage{

position:relative;

display:flex;
justify-content:center;
align-items:center;

max-width:92vw;
max-height:82vh;

overflow:hidden;

}

/* ---------- Image ---------- */

#lightboxImage{

display:block;


user-select: none;
-webkit-user-drag: none;
pointer-events: auto;
touch-action: none;
   
opacity:1;
transition:
opacity .25s,
transform .25s;
   
max-width:92vw;
max-height:82vh;

object-fit:contain;

border-radius:10px;



position:relative;

z-index:2;

}

/* ---------- Watermark ---------- */

.lightbox-watermark{

position:absolute;

inset:0;

pointer-events:none;

background-image:
url("images/watermark/watermark.png");

background-size:420px;
opacity:.10;

background-repeat:repeat;

background-position:center;



z-index:3;

}

/* ---------- Loader ---------- */

.lightbox-loader{

position:absolute;

width:38px;
height:38px;

border:3px solid rgba(255,255,255,.15);

border-top-color:white;

border-radius:50%;

animation:spin .8s linear infinite;

display:none;

z-index:4;

}

.lightbox.loading
.lightbox-loader{

display:block;

}

@keyframes spin{

to{

transform:rotate(360deg);

}

}

/* ---------- Close ---------- */

.lightbox-close{

position:absolute;

top:22px;
right:22px;

background:none;

border:none;

color:var(--accent);

font-size:34px;

cursor:pointer;

z-index:20;

opacity:.75;

transition:.2s;

}

.lightbox-close:hover{

opacity:1;

}

/* ---------- Prev / Next ---------- */

.lightbox-prev,
.lightbox-next{

position:absolute;

top:50%;

transform:translateY(-50%);

background:none;

border:none;

color:var(--accent);

cursor:pointer;

font-size:30px;

display:flex;

flex-direction:column;

align-items:center;

gap:6px;

opacity:.7;

transition:.2s;

z-index:20;

}

.lightbox-prev{

right:18px;

}

.lightbox-next{

left:18px;

}

.lightbox-prev:hover,
.lightbox-next:hover{

opacity:1;

}

.lightbox-prev span,
.lightbox-next span{

font-size:.58rem;
font-weight:500;
color:var(--accent);
margin-top:-2px;

font-family:Vazirmatn;

}

/* ---------- Counter ---------- */

.lightbox-counter{

position:absolute;

top:24px;

left:50%;

transform:translateX(-50%);

font-size:.8rem;

color:white;

opacity:.8;

z-index:20;

}

/* ---------- Caption ---------- */

.lightbox-caption{

position:absolute;

bottom:22px;

left:50%;

transform:translateX(-50%);

width:90%;

text-align:center;

color:white;

font-size:.9rem;

line-height:1.8;

z-index:20;

}


/* BOTTOM NAV */


.bottom-nav{

position:fixed;

bottom:0;

left:0;

right:0;

height:56px;

background:white;

border-top:1px solid #ddd;

display:flex;

justify-content:space-around;

align-items:center;

z-index:1000;

}



.bottom-nav a{

text-decoration:none;

color:#222;

font-size:.65rem;

display:flex;

flex-direction:column;

align-items:center;

}



.icon{

width:18px;

height:18px;

stroke:var(--accent);

fill:none;

}


.footer{

text-align:center;

font-size:.65rem;

color:#999;

padding:20px;

}



</style>


</head>
